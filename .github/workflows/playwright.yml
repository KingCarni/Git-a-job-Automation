name: Playwright QA Checks

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      upload_to_testrail:
        description: "Upload JUnit results to TestRail"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  playwright-tests:
    name: Run Playwright tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python for TRCLI
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testrail == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run CI-safe Playwright tests with JUnit output
        run: npm run test:ci:junit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/junit.xml

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/junit.xml
          retention-days: 7

      - name: Install TRCLI
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testrail == 'true' }}
        run: pip install trcli

      - name: Upload JUnit results to TestRail
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testrail == 'true' }}
        run: |
          trcli -y \
            -h "$TESTRAIL_URL" \
            --project "Git-a-Job Automation" \
            --username "$TESTRAIL_USER" \
            --key "$TESTRAIL_API_KEY" \
            parse_junit \
            -f "test-results/junit.xml" \
            --title "Git-a-Job Automated CI Fixture Import"
        env:
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}